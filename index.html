<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeecroWaveh</title>
    <meta name="description" content="MeecroWaveh is a web application that provides a map-based interface for users to locate microwaves, vending machines and printers on the BYUI campus.">
    <meta name="author" content="Boston Wyatt, Ethan Gilchrist, Kade Barker, Lev Zurcher, Nefi Raul Serrano Ramirez">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <link rel="stylesheet" href="css_files/MeecroWaveh.css">
    <link rel="stylesheet" href="css_files/output.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
</head>

<body class="bg-blue-100 text-slate-800 dark:bg-blue-950 dark:text-white transition-colors duration-300">
    <header class="flex justify-between items-center p-4">
        <h1 class="text-3x1 font-bold">MeecroWaveh</h1>

        <button id="theme" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">Dark Mode</button>
    </header>
    <p>Find microwaves, vending machines, and printers on the BYU-I campus.</p>
    <div id="map"></div>
    <div id="item_details"></div>
    
    <script src="js_files/map.js" defer></script>
    <script src="js_files/theme.js" defer></script>
</body>
</html>
