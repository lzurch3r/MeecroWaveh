<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeecroWaveh</title>
    <meta name="description" content="MeecroWaveh is a web application that provides a map-based interface for users to locate microwaves, vending machines and printers on the BYUI campus.">
    <meta name="author" content="Boston Wyatt, Ethan Gilchrist, Kade Barker, Lev Zurcher, Nefi Raul Serrano Ramirez">
    <link rel="icon" type="image/x-icon" href="/icons/icon-microwave_32x32.ico">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <link rel="stylesheet" href="css_files/MeecroWaveh.css">
    <link rel="stylesheet" href="css_files/tailwind.css">

<body class="bg-blue-100 text-slate-800 transition-colors duration-300">
    <header class="flex flex-col md:flex-row justify-between items-center p-4 gap-4">
        <div id="logo">
            <img class="icon" src="images\icon-microwave_200x200.png">
            <h1 class="text-3x1 font-bold">MeecroWaveh</h1>
        </div>        
        <ul class="flex flex-col md:flex-row gap-2">
            <li><a href="index.html">Map</a></li>
            <li><a href="contact.html">Contact</a></li>

        <button id="theme" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700">Dark Mode</button>

    <p>Is a vending machine missing? Did they move a microwave? <br> Contact us at 555-5555</p>
    <img id="anim" src="images\kris_run.gif" alt="kris deltarune running" >

    <footer>
        <h6>MeecroWaveh &#169;</h6>
